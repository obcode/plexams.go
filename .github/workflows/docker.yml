# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Create and publish a Docker image

on:
    release:
        types: [published]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push-image:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Get version from tag
              id: version
              run: |
                  VERSION=${GITHUB_REF#refs/tags/v}
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
                  echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ steps.version.outputs.VERSION }}
                      GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
                      BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}

    # Ship the freshly pushed image to the on-host compose stack. The runner lives ON the
    # deploy host (outbound-only long-poll to GitHub; the host is VPN-internal, so no
    # inbound is possible). It operates on the persistent on-host deploy dir where the
    # secrets live (.env, .plexams.yaml) plus the caddy-data volume (TLS certs) — those are
    # never touched; only the non-secret infra (compose file + Caddyfile) is synced from the repo.
    deploy:
        needs: build-and-push-image
        # Gate: only runs once the self-hosted runner on the deploy host exists — set the
        # repo variable AUTO_DEPLOY=true then. Until then the image is still built & pushed
        # above; this job is simply skipped (no stuck queue waiting for a missing runner).
        if: ${{ vars.AUTO_DEPLOY == 'true' }}
        runs-on: [self-hosted, plexams-deploy]
        env:
            # On-host deploy dir; override via repo variable DEPLOY_DIR if different.
            DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/home/plexams/plexams.go/deploy' }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Sync infra + deploy pinned image
              run: |
                  set -euo pipefail
                  # Keep the leading "v": docker/metadata-action tags the image with the raw
                  # git ref (v3.21.1), matching the whole registry's v-prefixed history — so
                  # PLEXAMS_TAG must carry the v too, else the pull 404s. (Only the build job
                  # above strips it, for the bare ldflags version.)
                  VERSION="${GITHUB_REF#refs/tags/}"

                  # Sync non-secret infra into the on-host deploy dir. Secrets (.env,
                  # .plexams.yaml) and the caddy-data volume (certs) stay put.
                  cp deploy/docker-compose.yml "$DEPLOY_DIR/"
                  CADDY_CHANGED=0
                  if ! diff deploy/Caddyfile "$DEPLOY_DIR/Caddyfile" >/dev/null 2>&1; then
                      cp deploy/Caddyfile "$DEPLOY_DIR/"
                      CADDY_CHANGED=1
                  fi

                  cd "$DEPLOY_DIR"
                  # Pin the backend tag so the host reflects the running version
                  # (manual rollback = edit .env + `docker compose up -d plexams`).
                  sed -i "s/^PLEXAMS_TAG=.*/PLEXAMS_TAG=$VERSION/" .env

                  docker compose pull plexams
                  # Reconcile the stack: only plexams (new tag) + any changed service is recreated.
                  docker compose up -d
                  # Caddy re-reads its Caddyfile only on container (re)start.
                  if [ "$CADDY_CHANGED" = "1" ]; then
                      docker compose up -d --force-recreate caddy
                  fi
                  docker image prune -f
