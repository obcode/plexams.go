# plexams reverse proxy + OIDC authentication (mod_auth_openidc against sso.hm.edu).
#
# Trust model: this proxy is the ONLY authenticated entry point. It sets the
# X-Remote-User header authoritatively (stripping any client-supplied value) from the
# verified OIDC "email" claim, and forwards to the plexams.go backend, which trusts
# that header. The backend is not published — reachable only via this proxy.

# --- Redirect plain HTTP to HTTPS ---
<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    RewriteEngine On
    RewriteRule ^/?(.*) https://${SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName ${SERVER_NAME}

    SSLEngine on
    SSLCertificateFile      /etc/ssl/plexams/fullchain.pem
    SSLCertificateKeyFile   /etc/ssl/plexams/privkey.pem

    # ============================================================
    # OIDC (mod_auth_openidc) — HM Shibboleth IdP OpenID Provider
    # ============================================================
    OIDCProviderMetadataURL https://sso.hm.edu/.well-known/openid-configuration
    OIDCClientID            ${OIDC_CLIENT_ID}
    OIDCClientSecret        ${OIDC_CLIENT_SECRET}

    # The callback URL registered with the HM IdP team. MUST match exactly.
    OIDCRedirectURI         https://${SERVER_NAME}/redirect_uri

    # Random 32+ char secret used to encrypt the local session/state cookies.
    OIDCCryptoPassphrase    ${OIDC_CRYPTO_PASSPHRASE}

    OIDCScope               "openid email profile"
    # REMOTE_USER (and the identity we forward) is the verified email claim.
    OIDCRemoteUserClaim     email

    # Session lifetimes (seconds): idle timeout and hard maximum.
    OIDCSessionInactivityTimeout 3600
    OIDCSessionMaxDuration       28800

    # Protect the whole site — every request needs a valid OIDC session.
    # (mod_auth_openidc handles /redirect_uri itself, before this check.)
    <Location />
        AuthType openid-connect
        Require valid-user
    </Location>

    # ============================================================
    # Authoritative identity headers to the backend
    # Strip anything the client sent, then set from the verified OIDC claims.
    # ============================================================
    RequestHeader unset X-Remote-User
    RequestHeader set   X-Remote-User        "%{OIDC_CLAIM_email}e"
    RequestHeader unset X-Remote-Displayname
    RequestHeader set   X-Remote-Displayname "%{OIDC_CLAIM_name}e"
    RequestHeader set   X-Forwarded-Proto    "https"

    ProxyPreserveHost On

    # ------------------------------------------------------------
    # GraphQL subscription websocket: upgrade /query to ws:// via
    # mod_proxy_wstunnel when the client requests an Upgrade.
    # ------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/query$ "ws://plexams:8080/query" [P,L]

    # ------------------------------------------------------------
    # API/REST → plexams.go backend
    # ------------------------------------------------------------
    ProxyPass        /query    http://plexams:8080/query
    ProxyPassReverse /query    http://plexams:8080/query
    ProxyPass        /upload   http://plexams:8080/upload
    ProxyPassReverse /upload   http://plexams:8080/upload
    ProxyPass        /download http://plexams:8080/download
    ProxyPassReverse /download http://plexams:8080/download

    # ------------------------------------------------------------
    # Everything else → the plexams.gui single-page app (static build).
    # Not proxied, so it must NOT be listed in ProxyPass above.
    # ------------------------------------------------------------
    ProxyPass /redirect_uri !
    DocumentRoot /var/www/plexams
    <Directory /var/www/plexams>
        Require all granted
        Options -Indexes
        # SPA client-side routing: serve index.html for unknown paths.
        FallbackResource /index.html
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/plexams_error.log
    CustomLog ${APACHE_LOG_DIR}/plexams_access.log combined
</VirtualHost>
