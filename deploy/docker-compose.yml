# plexams.go server deployment — nginx + oauth2-proxy (OIDC against sso.hm.edu).
#
# Topology:
#   internet ──443/TLS──> nginx
#                           ├── auth_request → oauth2-proxy (OIDC handshake w/ sso.hm.edu)
#                           ├── /oauth2/*    → oauth2-proxy (login/callback)
#                           ├── sets X-Remote-User from the verified email claim
#                           ├── /            → gui (plexams.gui container)
#                           └── /query,/upload,/download → plexams.go:8080
#   plexams / gui / mongo / oauth2-proxy ── internal only (never published)
#
# Only nginx publishes ports. plexams.go trusts the X-Remote-User header nginx sets,
# so it MUST NOT be reachable except through nginx — hence no `ports:`.
#
# Backend + GUI run as pre-built images from ghcr.io (tags pinned via PLEXAMS_TAG /
# GUI_TAG in .env; the CI deploy job updates them on release). No local build here.
#
# Setup: copy .env.example -> .env and .plexams.yaml.example -> .plexams.yaml, fill
# both, provide tls/ (see README.md), then: docker compose up -d

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # Published ONLY on the host loopback (127.0.0.1), never 0.0.0.0. That keeps Mongo
    # unreachable from the network/firewall — the only way in from outside is an SSH
    # tunnel onto the host (see README "Von außen an die MongoDB (SSH-Tunnel)"):
    #   ssh -L 27017:127.0.0.1:27017 plexams@<host>
    #   then connect Compass to mongodb://<MONGO_USER>:<pw>@localhost:27017/?authSource=admin
    # The 127.0.0.1 bind is safe even with Docker bypassing awall's INPUT chain: Docker's
    # DNAT only matches packets destined for 127.0.0.1, which external traffic never is.
    ports:
      - "127.0.0.1:27017:27017"
    # So plexams can wait for Mongo to be *ready* (not just started) — avoids the
    # boot race where plexams fatals on DB connect and crash-loops until Mongo is up.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  plexams:
    image: ghcr.io/obcode/plexams.go:${PLEXAMS_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./.plexams.yaml:/app/.plexams.yaml:ro
    # No ports: — only nginx reaches it (http://plexams:8080) over the internal network.
    expose:
      - "8080"

  gui:
    image: ghcr.io/obcode/plexams.gui:${GUI_TAG:-latest}
    restart: unless-stopped
    # SvelteKit app, served internally on 3000 (adapter-node default). No ports: —
    # only nginx reaches it (http://gui:3000). Keep the port in sync with the GUI
    # Dockerfile and the nginx `upstream plexams_gui` block.
    environment:
      # Where the GUI reaches the backend — the two hops need DIFFERENT URLs because only
      # one of them carries an OIDC session cookie:
      #   PUBLIC_* → client bundle: runs in the BROWSER, has the oauth2-proxy cookie, so it
      #     goes through nginx (public URL). Also drives the wss:// subscription upgrade.
      #   PLEXAMS_SERVER → SSR node server (+page.server.ts load(), hooks, /api proxies):
      #     runs in THIS container with NO cookie. If it hit the public URL, oauth2-proxy
      #     would bounce it to the sso.hm.edu login page and the GUI would try to parse that
      #     HTML as GraphQL ("result is not object or array" → 500). So it reaches the
      #     backend INTERNALLY, bypassing oauth2-proxy, and relays the X-Remote-User that
      #     nginx injected into this container's page request (see nginx `location /`).
      # The GUI reads both via $env/dynamic/* at runtime, so setting them here is enough.
      #
      # NOTE: with auth.enabled=true the backend fail-closed rejects internal SSR calls
      # unless the GUI forwards X-Remote-User. Until the GUI ships that forwarding, either
      # run with auth.enabled=false (SSO wall stays at nginx, everyone acts as ADMIN) or
      # keep both URLs on the public one. See ../deploy/README.md "SSR-Identität".
      PUBLIC_PLEXAMS_SERVER: https://${SERVER_NAME}/query
      PLEXAMS_SERVER: ${PLEXAMS_SERVER:-http://plexams:8080/query}
    expose:
      - "3000"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://sso.hm.edu
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      # MUST match the redirect URI registered with the HM IdP team.
      OAUTH2_PROXY_REDIRECT_URL: https://${SERVER_NAME}/oauth2/callback
      OAUTH2_PROXY_SCOPE: "openid profile email department"
      # HM's id_token is minimal; email/preferred_username/fhmDepartment all come from the
      # IdP UserInfo endpoint, which oauth2-proxy's claim extractor queries at login. It
      # only retains its four known fields (email/user/preferred_username/groups), so we
      # read the faculty (claim `fhmDepartment`, e.g. "07" = FK07) through the groups slot;
      # nginx forwards it as X-Remote-Department. Identity stays email; names come from ZPA.
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: "fhmDepartment"
      # Extra layer on top of the DB allow-list (the backend is authoritative).
      OAUTH2_PROXY_EMAIL_DOMAINS: hm.edu
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # Expose X-Auth-Request-Email/-User on the /oauth2/auth response for nginx.
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${SERVER_NAME}
      # oauth2-proxy is used only for auth (via nginx auth_request) + the login flow,
      # not as a real upstream — so a static 200 upstream is enough.
      OAUTH2_PROXY_UPSTREAMS: static://200
      # Shibboleth OPs often omit email_verified; tighten to "false" if the IdP sets it.
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
    expose:
      - "4180"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - plexams
      - gui
      - oauth2-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Substituted into templates/*.template by the nginx image (envsubst).
      SERVER_NAME: ${SERVER_NAME}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./tls:/etc/ssl/plexams:ro         # fullchain.pem + privkey.pem (acme.sh)
      - ./acme-webroot:/var/www/acme:ro   # ACME HTTP-01 challenge files (acme.sh writes)

  # Self-hosted GitHub Actions Runner für den automatischen Deploy (siehe README
  # "Automatischer Deploy"). Der Host ist nur im VPN erreichbar, GitHub kann also nicht
  # hineinpushen — dieser Runner pollt ausgehend zu GitHub und führt bei einem Release
  # lokal `docker compose` aus. Läuft als Container, weil der Host (Alpine/musl, kein
  # systemd) das native .NET-Runner-Binary nicht ausführen kann; das glibc-Image umgeht
  # sowohl das musl- als auch das systemd-Problem.
  #
  # WICHTIG — `profiles: [runner]`: der Deploy-Job macht ein blankes `docker compose up -d`.
  # Ein Service unter einem Profil wird davon KOMPLETT ignoriert (weder gestartet noch
  # gestoppt), läuft also ungestört weiter — sonst würde der Runner sich mitten im eigenen
  # Deploy-Job selbst neu starten und den Job abbrechen. Deshalb ist der Runner nicht Teil
  # des Default-Stacks; er wird einmalig separat gestartet:
  #   docker compose --profile runner up -d gh-runner
  gh-runner:
    image: myoung34/github-runner:latest
    container_name: plexams-gh-runner
    restart: unless-stopped
    profiles: ["runner"]
    environment:
      REPO_URL: https://github.com/obcode/plexams.go
      RUNNER_NAME: plexams-deploy
      RUNNER_SCOPE: repo
      LABELS: plexams-deploy
      # PAT (Fine-grained: Actions RW, oder classic mit repo+workflow) statt des
      # kurzlebigen Registration-Tokens aus der GitHub-UI: das Image erneuert damit
      # Registration-Tokens selbst und übersteht Neustarts ohne Token-Tausch.
      ACCESS_TOKEN: ${GH_RUNNER_PAT:-}
      RUNNER_WORKDIR: /tmp/runner/work
    security_opt:
      - label:disable
    volumes:
      # Docker-Socket des Hosts → `docker compose` im Deploy-Job spricht mit dem
      # Host-Daemon; die Bind-Mounts im Compose-File lösen gegen Host-Pfade auf.
      - /var/run/docker.sock:/var/run/docker.sock
      # Das on-host Deploy-Verzeichnis unter GLEICHEM Pfad, damit `cp`/`sed` im Job und
      # die Compose-Bind-Mounts stimmen (DEPLOY_DIR default /home/plexams/plexams.go/deploy).
      - /home/plexams/plexams.go/deploy:/home/plexams/plexams.go/deploy
      - /tmp/runner:/tmp/runner

volumes:
  mongo-data:
