# Smoke test — Step 1: TLS/ACME only. nginx serves a static "Hello World" over HTTPS.
# No OIDC, no plexams, no mongo. Proves the DNS name, the certificate (acme.sh/EAB
# against the HM ACME CA) and the reverse proxy host all work, before adding login.
#
# Setup: cp .env.example .env && cp acme.env.example acme.env (fill both), bootstrap a
# self-signed cert (see ../README.md), then: docker compose up -d && ./acme-setup.sh

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./tls:/etc/ssl/plexams:ro         # fullchain.pem + privkey.pem (acme.sh)
      - ./acme-webroot:/var/www/acme:ro   # ACME HTTP-01 challenge files
