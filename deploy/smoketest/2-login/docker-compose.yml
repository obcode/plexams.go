# Smoke test — Step 2: TLS + OIDC login (nginx + oauth2-proxy), still WITHOUT plexams.
# After a successful login against sso.hm.edu, nginx renders a "Hallo <email>" page
# listing the attributes the IdP released. Intentionally non-critical: any account the
# IdP authenticates may log in and just sees its own data (no allow-list).
#
# Setup: cp .env.example .env && cp acme.env.example acme.env (fill both), reuse or
# bootstrap the cert (see ../README.md), then: docker compose up -d && ./acme-setup.sh

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://sso.hm.edu
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      # MUST match the redirect URI registered with the HM IdP team.
      OAUTH2_PROXY_REDIRECT_URL: https://${SERVER_NAME}/oauth2/callback
      OAUTH2_PROXY_SCOPE: "openid profile email department"
      # Expose the raw id_token as "Authorization: Bearer …" on the /oauth2/auth response
      # so nginx (auth_request) can hand it to the greeting page, which decodes ALL claims
      # client-side — including ones without a dedicated X-Auth-Request-* header (department).
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      # DIAGNOSTIC ONLY: HM's id_token is minimal (no email/groups/department) — those
      # claims come from the IdP UserInfo endpoint, which oauth2-proxy's claim extractor
      # also queries. The simple env config has no per-claim custom header, so to SEE that
      # `department` actually arrives we repurpose the groups claim to read `department`.
      # It then shows up as X-Auth-Request-Groups / the "groups" field. Not for production
      # (a real deployment would use --alpha-config injectResponseHeaders for a dedicated
      # X-Auth-Request-Department header); the plexams backend needs only email anyway.
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: "department"
      # Permissive for the test: any account the IdP authenticates may log in.
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${SERVER_NAME}
      OAUTH2_PROXY_UPSTREAMS: static://200
      # Shibboleth OPs often omit email_verified; tighten to "false" if the IdP sets it.
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
    expose:
      - "4180"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - oauth2-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./tls:/etc/ssl/plexams:ro
      - ./acme-webroot:/var/www/acme:ro
